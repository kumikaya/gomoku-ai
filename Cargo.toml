[package]
name = "gobang-ai"
version = "0.1.0"
edition = "2024"

[dependencies]
burn = { git = "https://github.com/tracel-ai/burn.git", features = [
    "std",
    "autodiff",
    "train",
    "ndarray",
    "optim",
    # "cuda",
    # "autotune",
], default-features = false }
rand = "0.10.1"
rand_distr = "0.6.0"
rayon = "1.12.0"
serde = "1.0.228"

[profile.dev.package."*"]
opt-level = 3
